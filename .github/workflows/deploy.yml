name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build latest site
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: 1

      - name: Build tagged versions
        shell: bash
        run: |
          set -euo pipefail

          latest_dist="$PWD/dist"
          latest_dist_snapshot="$RUNNER_TEMP/nazotte-connect-latest-dist"
          version_dist_root="$RUNNER_TEMP/nazotte-connect-version-dists"
          current_ref="$(git rev-parse HEAD)"
          rm -rf "$latest_dist_snapshot" "$version_dist_root"
          mkdir -p "$latest_dist_snapshot" "$version_dist_root"
          cp -a "$latest_dist/." "$latest_dist_snapshot/"

          version_tags="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=v:refname)"
          if [ -z "$version_tags" ]; then
            echo "No version tags found."
            exit 0
          fi

          playable_version_tags="$(
            printf '%s\n' "$version_tags" |
              awk -F'[v.]' '{ key = $2 "." $3; latest[key] = $0 } END { for (key in latest) print latest[key] }' |
              sort -V
          )"

          while IFS= read -r version_tag; do
            echo "::group::Build ${version_tag}"
            git reset --hard
            git checkout --detach "$version_tag"

            if [ -n "$(git lfs ls-files --name-only)" ]; then
              git lfs pull
            fi
            npm install
            NAZOTTE_CONNECT_VERSION_PATH="$version_tag" npm run build

            mkdir -p "${version_dist_root}/${version_tag}"
            cp -a "dist/." "${version_dist_root}/${version_tag}/"
            echo "::endgroup::"
          done <<< "$playable_version_tags"

          git reset --hard
          git checkout --detach "$current_ref"
          rm -rf "$latest_dist"
          mkdir -p "$latest_dist"
          cp -a "$latest_dist_snapshot/." "$latest_dist/"

          while IFS= read -r version_tag; do
            mkdir -p "${latest_dist}/${version_tag}"
            cp -a "${version_dist_root}/${version_tag}/." "${latest_dist}/${version_tag}/"
          done <<< "$playable_version_tags"
        env:
          ASTRO_TELEMETRY_DISABLED: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
